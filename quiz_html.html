<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>اختبار HTML - التقنيات التعليمية</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap');

  :root {
    --neon-blue: #00d4ff;
    --neon-purple: #b44dff;
    --neon-green: #00ff9f;
    --neon-red: #ff4d6d;
    --bg-dark: #0a0a14;
    --bg-card: #0f0f1e;
    --bg-card2: #13132a;
    --border-glow: rgba(0, 212, 255, 0.25);
    --text-primary: #e8eaf6;
    --text-secondary: #8892b0;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Cairo', sans-serif;
    background: var(--bg-dark);
    color: var(--text-primary);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }

  body::before {
    content: '';
    position: fixed;
    top: -50%;
    right: -20%;
    width: 600px;
    height: 600px;
    background: radial-gradient(circle, rgba(180,77,255,0.08) 0%, transparent 70%);
    pointer-events: none;
  }
  body::after {
    content: '';
    position: fixed;
    bottom: -30%;
    left: -10%;
    width: 500px;
    height: 500px;
    background: radial-gradient(circle, rgba(0,212,255,0.07) 0%, transparent 70%);
    pointer-events: none;
  }

  .quiz-wrapper {
    width: 100%;
    max-width: 720px;
    padding: 20px;
    position: relative;
    z-index: 1;
  }

  /* Header */
  .quiz-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
  }

  .quiz-title {
    font-size: 14px;
    color: var(--neon-blue);
    letter-spacing: 2px;
    text-transform: uppercase;
    font-weight: 600;
  }

  .progress-info {
    font-size: 13px;
    color: var(--text-secondary);
    direction: ltr;
  }
  .progress-info span {
    color: var(--neon-blue);
    font-weight: 700;
  }

  /* Progress bar */
  .progress-bar-wrap {
    height: 3px;
    background: rgba(255,255,255,0.06);
    border-radius: 2px;
    margin-bottom: 24px;
    overflow: hidden;
  }
  .progress-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--neon-purple), var(--neon-blue));
    border-radius: 2px;
    transition: width 0.5s cubic-bezier(.4,0,.2,1);
    box-shadow: 0 0 8px var(--neon-blue);
  }

  /* Question card */
  .question-card {
    background: var(--bg-card);
    border: 1px solid var(--border-glow);
    border-radius: 16px;
    padding: 32px;
    margin-bottom: 16px;
    position: relative;
    overflow: hidden;
    animation: slideIn 0.35s cubic-bezier(.4,0,.2,1);
  }
  .question-card::before {
    content: '';
    position: absolute;
    top: 0; right: 0;
    width: 100%; height: 2px;
    background: linear-gradient(90deg, transparent, var(--neon-purple), var(--neon-blue), transparent);
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(18px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .q-number {
    font-size: 11px;
    color: var(--neon-purple);
    letter-spacing: 3px;
    font-weight: 700;
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .q-number::before {
    content: '';
    display: inline-block;
    width: 6px; height: 6px;
    background: var(--neon-purple);
    border-radius: 50%;
    box-shadow: 0 0 8px var(--neon-purple);
  }

  .q-text {
    font-size: 18px;
    font-weight: 700;
    line-height: 1.7;
    color: var(--text-primary);
  }

  /* Options */
  .options-grid {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-bottom: 20px;
    animation: slideIn 0.4s cubic-bezier(.4,0,.2,1) 0.1s both;
  }

  .option-btn {
    background: var(--bg-card2);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 10px;
    padding: 14px 20px;
    cursor: pointer;
    text-align: right;
    font-family: 'Cairo', sans-serif;
    font-size: 15px;
    color: var(--text-primary);
    transition: all 0.2s ease;
    display: flex;
    align-items: center;
    gap: 12px;
    position: relative;
    overflow: hidden;
  }
  .option-btn:hover:not(:disabled) {
    border-color: rgba(0, 212, 255, 0.4);
    background: rgba(0, 212, 255, 0.05);
    transform: translateX(-3px);
  }
  .option-btn:disabled { cursor: default; }

  .option-label {
    width: 28px; height: 28px;
    border-radius: 50%;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.12);
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 700;
    flex-shrink: 0;
    color: var(--text-secondary);
    transition: all 0.2s;
  }

  .option-btn.correct {
    border-color: var(--neon-green);
    background: rgba(0, 255, 159, 0.08);
  }
  .option-btn.correct .option-label {
    background: var(--neon-green);
    border-color: var(--neon-green);
    color: #0a0a14;
  }
  .option-btn.wrong {
    border-color: var(--neon-red);
    background: rgba(255, 77, 109, 0.08);
  }
  .option-btn.wrong .option-label {
    background: var(--neon-red);
    border-color: var(--neon-red);
    color: #fff;
  }
  .option-btn.dimmed { opacity: 0.35; }

  /* Feedback */
  .feedback-box {
    padding: 12px 18px;
    border-radius: 10px;
    font-size: 14px;
    font-weight: 600;
    margin-bottom: 16px;
    display: none;
    align-items: center;
    gap: 10px;
    animation: fadeUp 0.3s ease;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .feedback-box.correct {
    display: flex;
    background: rgba(0, 255, 159, 0.1);
    border: 1px solid rgba(0, 255, 159, 0.3);
    color: var(--neon-green);
  }
  .feedback-box.wrong {
    display: flex;
    background: rgba(255, 77, 109, 0.1);
    border: 1px solid rgba(255, 77, 109, 0.3);
    color: var(--neon-red);
  }
  .feedback-icon { font-size: 18px; }

  /* Next button */
  .next-btn {
    width: 100%;
    padding: 14px;
    background: linear-gradient(135deg, var(--neon-purple), var(--neon-blue));
    border: none;
    border-radius: 10px;
    font-family: 'Cairo', sans-serif;
    font-size: 16px;
    font-weight: 700;
    color: #fff;
    cursor: pointer;
    display: none;
    transition: all 0.2s;
    box-shadow: 0 4px 20px rgba(0, 212, 255, 0.2);
    animation: fadeUp 0.3s ease;
  }
  .next-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 28px rgba(0, 212, 255, 0.35);
  }
  .next-btn.visible { display: block; }

  /* Score screen */
  .score-screen {
    display: none;
    text-align: center;
    padding: 40px 32px;
    background: var(--bg-card);
    border: 1px solid var(--border-glow);
    border-radius: 16px;
    position: relative;
    overflow: hidden;
    animation: slideIn 0.4s ease;
  }
  .score-screen::before {
    content: '';
    position: absolute;
    top: 0; right: 0;
    width: 100%; height: 2px;
    background: linear-gradient(90deg, transparent, var(--neon-green), var(--neon-blue), transparent);
  }

  .score-emoji { font-size: 56px; margin-bottom: 16px; }
  .score-title { font-size: 26px; font-weight: 900; color: var(--neon-blue); margin-bottom: 8px; }
  .score-subtitle { font-size: 15px; color: var(--text-secondary); margin-bottom: 28px; }
  .score-number {
    font-size: 72px; font-weight: 900;
    background: linear-gradient(135deg, var(--neon-purple), var(--neon-blue));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    line-height: 1;
    margin-bottom: 4px;
  }
  .score-total { font-size: 18px; color: var(--text-secondary); margin-bottom: 32px; }

  .score-stats {
    display: flex; gap: 16px; justify-content: center; margin-bottom: 32px;
  }
  .stat-box {
    background: var(--bg-card2);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 12px;
    padding: 16px 24px;
    min-width: 120px;
  }
  .stat-val { font-size: 28px; font-weight: 900; }
  .stat-val.correct-color { color: var(--neon-green); }
  .stat-val.wrong-color { color: var(--neon-red); }
  .stat-label { font-size: 12px; color: var(--text-secondary); margin-top: 4px; }

  .restart-btn {
    padding: 14px 40px;
    background: linear-gradient(135deg, var(--neon-purple), var(--neon-blue));
    border: none; border-radius: 10px;
    font-family: 'Cairo', sans-serif;
    font-size: 16px; font-weight: 700;
    color: #fff; cursor: pointer;
    transition: all 0.2s;
    box-shadow: 0 4px 20px rgba(0, 212, 255, 0.2);
  }
  .restart-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 28px rgba(0, 212, 255, 0.35);
  }
</style>
</head>
<body>
<div class="quiz-wrapper">
  <div id="quizArea">
    <div class="quiz-header">
      <div class="quiz-title">اختبار · HTML</div>
      <div class="progress-info">سؤال <span id="currentNum">1</span> من <span id="totalNum">45</span></div>
    </div>
    <div class="progress-bar-wrap">
      <div class="progress-bar-fill" id="progressBar" style="width:2.2%"></div>
    </div>
    <div class="question-card">
      <div class="q-number" id="qNumber">سؤال 01</div>
      <div class="q-text" id="qText"></div>
    </div>
    <div class="options-grid" id="optionsGrid"></div>
    <div class="feedback-box" id="feedbackBox">
      <span class="feedback-icon" id="feedbackIcon"></span>
      <span id="feedbackText"></span>
    </div>
    <button class="next-btn" id="nextBtn" onclick="nextQuestion()">السؤال التالي ←</button>
  </div>
  <div class="score-screen" id="scoreScreen">
    <div class="score-emoji" id="scoreEmoji">🏆</div>
    <div class="score-title">انتهى الاختبار!</div>
    <div class="score-subtitle">نتيجتك النهائية</div>
    <div class="score-number" id="scoreNum">0</div>
    <div class="score-total" id="scoreTotal">من 45 سؤال</div>
    <div class="score-stats">
      <div class="stat-box">
        <div class="stat-val correct-color" id="correctCount">0</div>
        <div class="stat-label">إجابات صحيحة</div>
      </div>
      <div class="stat-box">
        <div class="stat-val wrong-color" id="wrongCount">0</div>
        <div class="stat-label">إجابات خاطئة</div>
      </div>
    </div>
    <button class="restart-btn" onclick="restart()">إعادة الاختبار</button>
  </div>
</div>

<script>
const questions = [
  {q:"ما هي اللغة المستخدمة في إنشاء صفحات الويب ويرمز لها بـ HTML؟",choices:["High Text Make Language","Hyper Text Markup Language","Hyper Tool Mark Language","Home Text Markup Language"],correct:1},
  {q:"أي من الوسوم التالية يعتبر الوسم الجذري (Root) الذي يجب أن يبدأ به وينتهي به ملف صفحة الويب؟",choices:["<body>","<head>","<html>","<title>"],correct:2},
  {q:"إذا طلب منك المعلم كتابة السطر الافتتاحي والختامي لملف HTML، ما هو الاختيار الصحيح الذي يجب تنفيذه؟",choices:["كتابة <start> و <end>","كتابة <html> في البداية و </html> في النهاية","كتابة <body> فقط","كتابة <code> و </code>"],correct:1},
  {q:"لماذا يجب الاهتمام بكتابة امتداد الملف .html بدقة عند الحفظ؟",choices:["لأن ذلك يجعل ألوان الصفحة أجمل","لأن المتصفح لن يتعرف على الملف كصفحة ويب دون الامتداد الصحيح","لأن ذلك يزيد من سرعة الإنترنت","لأن ذلك يحمي الملف من الفيروسات"],correct:1},
  {q:"عند حفظ ملف الكود، ماذا يعكس التزامك بكتابة الامتداد الصحيح بدقة؟",choices:["عشوائية في العمل","قيمة الدقة والالتزام بتعليمات البرمجة","رغبة في تعقيد الملف","عدم أهمية لتنظيم الملفات"],correct:1},
  {q:"يحتوي قسم الـ ........ على البيانات الوصفية للصفحة التي لا تظهر مباشرة للمستخدم داخل جسم الصفحة.",choices:["<body>","<head>","<html>","<img>"],correct:1},
  {q:"المعلومات التي تظهر في الشريط العلوي للمتصفح (Title Bar) يتم تعريفها داخل الوسم:",choices:["<body>","<head>","<title>","<html>"],correct:2},
  {q:"إذا أردت إضافة عنوان لصفحتك يظهر في تبويب المتصفح، أين تضع الكود الخاص به؟",choices:["داخل وسم <body>","داخل وسم <head> باستخدام <title>","خارج وسم <html>","داخل وسم <p>"],correct:1},
  {q:"لماذا يعتبر كتابة عنوان دقيق ومختلف لكل صفحة (<title>) أمراً مهماً؟",choices:["لتلوين الصفحة بشكل عشوائي","لتنظيم الملفات والتعرف على محتوى كل تبويب بسهولة","لزيادة حجم الملف بشكل كبير","لإخفاء المحتوى عن المستخدم"],correct:1},
  {q:"هل يظهر محتوى وسم <head> كنص مرئي داخل جسم الصفحة مباشرة؟",choices:["نعم يظهر كنص عادي","لا يظهر مباشرة بل كبيانات وصفية أو في شريط العنوان","يظهر كصور فقط","يظهر كروابط فقط"],correct:1},
  {q:"كل ما يريد المبرمج عرضه للمستخدم من نصوص وصور يوضع داخل الوسم:",choices:["<body>","<head>","<html>","<title>"],correct:0},
  {q:"إذا كتب الطالب نصاً خارج وسم <body>، ماذا سيحدث لهذا النص عند العرض؟",choices:["يظهر بخط عريض","لا يظهر في صفحة العرض","يظهر كعنوان رئيسي","يتحول إلى رابط"],correct:1},
  {q:"لديك كود به نص مكتوب خارج الوسم المناسب، ما الإجراء الصحيح لجعل النص ظاهراً؟",choices:["حذف النص تماماً","نقل النص ليصبح داخل <body> ... </body>","وضع النص داخل <head>","تغيير امتداد الملف"],correct:1},
  {q:"ما الذي يعكسه التزامك بوضع كل المحتوى المرئي داخل وسم <body>؟",choices:["عدم المبالاة بهيكل الصفحة","احترام هيكلية الصفحة وتنظيمها المنطقي","رغبة في إخفاء المعلومات","عدم فهم لغة HTML"],correct:1},
  {q:"ما هو الترتيب الصحيح لهيكل صفحة HTML لضمان عمل قسم المحتوى؟",choices:["<body> يحتوي على <html> و <head>","<html> يحتوي على <head> و <body>","<head> يحتوي على <html> و <body>","<body> يحتوي على <title> فقط"],correct:1},
  {q:"إذا أردت أن يظهر عنوان رئيسي بأكبر حجم خط ممكن في الصفحة، أي وسم تستخدم؟",choices:["<h6>","<h3>","<h1>","<head>"],correct:2},
  {q:"كم عدد مستويات العناوين المتاحة في لغة HTML؟",choices:["3 مستويات","5 مستويات","6 مستويات","10 مستويات"],correct:2},
  {q:"تريد تصميم مطوية إلكترونية تحتوي على عنوان رئيسي وعنوان فرعي، ما الكود الأنسب؟",choices:["استخدام <h1> للعنوان الرئيسي و <h3> للفرعي","استخدام <h6> للعنوان الرئيسي و <h1> للفرعي","استخدام <p> للعناوين فقط","استخدام <body> للعناوين"],correct:0},
  {q:"ما الفائدة الرئيسية من استخدام تسلسل العناوين (<h1> إلى <h6>) في صفحة الويب؟",choices:["لتلوين النصوص بألوان عشوائية","لتنظيم المحتوى وهيكلة الأفكار لتسهيل القراءة","لإضافة صور متحركة","لإنشاء روابط تشعبية"],correct:1},
  {q:"أي من وسوم العناوين التالية يمثل أصغر حجم خط؟",choices:["<h1>","<h2>","<h5>","<h6>"],correct:3},
  {q:"ما هو الوسم المستخدم لتقسيم النص إلى فقرات منطقية منفصلة؟",choices:["<h1>","<p>","<br>","<hr>"],correct:1},
  {q:"لتوسيط نص داخل فقرة، نستخدم السمة align ونحدد قيمتها بـ:",choices:["left","right","center","middle"],correct:2},
  {q:'عدل الكود <p>نص</p> ليظهر النص محاذاً لليمين، ما هو الكود الصحيح؟',choices:['<p align="left">نص</p>','<p align="center">نص</p>','<p align="right">نص</p>','<p align="justify">نص</p>'],correct:2},
  {q:"لماذا نستخدم خاصية المحاذاة (Alignment) في تنسيق الفقرات؟",choices:["لتعقيد الكود بدون فائدة","لتحسين الشكل الجمالي وتنظيم المحتوى بصرياً لتسهيل القراءة","لزيادة حجم الملف","لتحويل النص إلى رابط"],correct:1},
  {q:"كيف يغلق وسم الفقرة <p> بشكل صحيح؟",choices:["<p>","</p>","<end>","</paragraph>"],correct:1},
  {q:"ما هو الوسم المستخدم لإدراج صورة في صفحة الويب؟",choices:["<picture>","<img>","<image>","<src>"],correct:1},
  {q:"السمة المستخدمة داخل وسم الصورة لتحديد مكان ملف الصورة على الجهاز هي:",choices:["href","link","src","path"],correct:2},
  {q:"اكتب الكود اللازم لإدراج صورة اسمها logo.png داخل الصفحة، ما هو الاختيار الصحيح؟",choices:['<img href="logo.png">','<img src="logo.png">','<image src="logo.png">','<pic src="logo.png">'],correct:1},
  {q:"إذا ظهرت الصورة كأيقونة مكسورة واكتشفت أن السبب خطأ في اسم الملف، ما الذي يجب أن تتعلمه؟",choices:["أن الصور لا تعمل في HTML","أهمية الدقة في كتابة الأحرف (Capital & Small) ومسار الملف","أن المتصفح تالف","أن الملف كبير جداً"],correct:1},
  {q:"هل يحتاج وسم <img> إلى وسم إغلاق؟",choices:["نعم يحتاج إلى </img>","لا، هو وسم منفرد (Self-closing)","نعم يحتاج إلى <end>","يعتمد على نوع الصورة"],correct:1},
  {q:"الفائدة الرئيسية من استخدام الروابط التشعبية (Hyperlinks) في صفحات الويب هي:",choices:["تلوين الصفحة","التنقل بين الصفحات والمواقع","كتابة النصوص","حفظ الملفات"],correct:1},
  {q:"ما هو المصطلح التقني للرابط الذي ينقلك من صفحة لأخرى؟",choices:["Hyperlink","HyperText","ImageMap","StyleSheet"],correct:0},
  {q:"كيف يحول الرابط التشعبي الصفحة من نص ثابت إلى بيئة تفاعلية؟",choices:["يغير ألوان النصوص فقط","يسمح للمستخدم بالتنقل والوصول للمعلومات بسرعة وسهولة","يضيف صوراً متحركة فقط","يزيد من سرعة الإنترنت"],correct:1},
  {q:"لماذا يُعد وجود روابط واضحة بين صفحات الموقع قيمة مهمة في تجربة المستخدم؟",choices:["لأنها تجعل الموقع ملوناً","لأنها تسهل الوصول للمعلومات وتجعل التصفح سلساً ومريحاً","لأنها تزيد من عدد الملفات","لأنها تخفي المحتوى القديم"],correct:1},
  {q:"هل يمكن للرابط التشعبي أن ينقلك لجزء داخل نفس الصفحة؟",choices:["لا، فقط لصفحات أخرى","نعم، يمكنه التنقل داخل نفس الصفحة أو صفحات أخرى","فقط للصور","فقط للملفات الصوتية"],correct:1},

const labels = ['أ','ب','ج','د'];
let current = 0, score = 0, wrong = 0, answered = false;

function loadQuestion() {
  const q = questions[current];
  answered = false;
  document.getElementById('currentNum').textContent = current + 1;
  document.getElementById('totalNum').textContent = questions.length;
  document.getElementById('qNumber').textContent = 'سؤال ' + String(current + 1).padStart(2, '0');
  document.getElementById('qText').textContent = q.q;
  document.getElementById('progressBar').style.width = ((current / questions.length) * 100) + '%';

  const grid = document.getElementById('optionsGrid');
  grid.innerHTML = '';
  q.choices.forEach((c, i) => {
    const btn = document.createElement('button');
    btn.className = 'option-btn';
    btn.innerHTML = `<span class="option-label">${labels[i]}</span><span>${c}</span>`;
    btn.onclick = () => selectAnswer(i);
    grid.appendChild(btn);
  });

  document.getElementById('feedbackBox').className = 'feedback-box';
  document.getElementById('nextBtn').className = 'next-btn';
}

function selectAnswer(idx) {
  if (answered) return;
  answered = true;
  const q = questions[current];
  const btns = document.querySelectorAll('.option-btn');
  const fb = document.getElementById('feedbackBox');
  const isCorrect = idx === q.correct;

  btns.forEach((btn, i) => {
    btn.disabled = true;
    if (i === q.correct) btn.classList.add('correct');
    else if (i === idx && !isCorrect) btn.classList.add('wrong');
    else btn.classList.add('dimmed');
  });

  if (isCorrect) {
    score++;
    fb.className = 'feedback-box correct';
    document.getElementById('feedbackIcon').textContent = '✓';
    document.getElementById('feedbackText').textContent = 'إجابة صحيحة! أحسنت 🎉';
  } else {
    wrong++;
    fb.className = 'feedback-box wrong';
    document.getElementById('feedbackIcon').textContent = '✗';
    document.getElementById('feedbackText').textContent = 'إجابة خاطئة — الصح: ' + q.choices[q.correct];
  }

  const isLast = current === questions.length - 1;
  const nextBtn = document.getElementById('nextBtn');
  nextBtn.className = 'next-btn visible';
  nextBtn.textContent = isLast ? 'عرض النتيجة 🏆' : 'السؤال التالي ←';
}

function nextQuestion() {
  current++;
  if (current >= questions.length) showScore();
  else loadQuestion();
}

function showScore() {
  document.getElementById('quizArea').style.display = 'none';
  const ss = document.getElementById('scoreScreen');
  ss.style.display = 'block';
  const pct = Math.round((score / questions.length) * 100);
  document.getElementById('scoreNum').textContent = score;
  document.getElementById('scoreTotal').textContent = 'من ' + questions.length + ' سؤال (' + pct + '%)';
  document.getElementById('correctCount').textContent = score;
  document.getElementById('wrongCount').textContent = wrong;
  document.getElementById('scoreEmoji').textContent = pct >= 90 ? '🏆' : pct >= 70 ? '⭐' : pct >= 50 ? '📚' : '💪';
}

function restart() {
  current = 0; score = 0; wrong = 0;
  document.getElementById('scoreScreen').style.display = 'none';
  document.getElementById('quizArea').style.display = 'block';
  loadQuestion();
}

loadQuestion();
</script>
